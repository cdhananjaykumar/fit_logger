<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSY FitLog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#43a047">
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="container">
        <div class="card">
            <h1>GSY FitLog</h1>
            <p>Enter Your Name</p>

            <input type="text" id="nameInput" placeholder="Your Name">

            <label>Height (cm)</label>
            <input type="number" id="heightInput" step="0.1" placeholder="e.g. 170">
            <p class="helperText">Used to calculate your healthy weight range (BMI)</p>

            <button onclick="saveName()">Start</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container hidden">
        <div class="card">

            <h2 id="userHeading"></h2>

            <div class="dateBox">
                Date: <span id="currentDate"></span>
                &nbsp;&middot;&nbsp;
                Height: <span id="heightDisplay"></span> cm
                <button class="linkBtn" onclick="editHeight()">Edit</button>
            </div>

            <label>Weight (kg)</label>
            <input type="number" id="weightInput" step="0.1">

            <label>Step Count</label>
            <input type="number" id="stepsInput" step="1" min="0" placeholder="e.g. 8500">

            <h3>Food Intake</h3>

            <div class="checkbox-group">
                <label><input type="checkbox" id="normal"> Normal</label>
                <label><input type="checkbox" id="sugar"> Sugar Intake</label>
                <label><input type="checkbox" id="tea"> Tea</label>
                <label><input type="checkbox" id="nonveg"> Non Veg</label>
            </div>

            <button id="saveEntryBtn" onclick="saveEntry()">Save Entry</button>

            <div id="statusMessage"></div>

            <p class="lockNote">Today's entry can be updated anytime today. Once the date passes, it locks permanently.</p>

            <button class="secondaryBtn" onclick="showHistory()">View History</button>

        </div>
    </div>

    <!-- History Screen -->
    <div id="historyScreen" class="container hidden wide">
        <div class="card">

            <div class="historyHeader">
                <h2>History</h2>
                <button class="secondaryBtn small" onclick="showDashboard()">Back</button>
            </div>

            <canvas id="weightChart" height="200"></canvas>

            <div class="chartLegend">
                <span><i class="dot under"></i> Underweight</span>
                <span><i class="dot normal"></i> Healthy (BMI)</span>
                <span><i class="dot over"></i> Overweight</span>
            </div>

            <div id="statsRow" class="statsRow"></div>

            <div class="listHeader">
                <h3>Past Entries</h3>
                <button class="secondaryBtn small" onclick="exportCSV()">Export CSV</button>
            </div>

            <button class="secondaryBtn" onclick="toggleRemarkForm()">+ Add Remark for a Missed Day</button>

            <div id="remarkForm" class="remarkForm hidden">
                <label>Missed Date</label>
                <input type="date" id="remarkDate">

                <label>Remark</label>
                <input type="text" id="remarkText" placeholder="e.g. Traveling, forgot to log">

                <button onclick="saveRemark()">Save Remark</button>
            </div>

            <div id="entryList" class="entryList"></div>

        </div>
    </div>

<script src="chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
